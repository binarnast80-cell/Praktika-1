<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Aidana — life journey (prototype)</title>
        <link rel="stylesheet" href="Aidana.css" />
    </head>
    <body>
        <main class="life-journey" id="life-journey">
            <div class="viewport" id="viewport">
                <div class="world" id="world">
                    <!-- Сюда динамически добавляются платформы и здания -->
                    
                    <div class="player-character" id="player" aria-hidden="false">
                        <img id="player-sprite" class="player-sprite" src="image/baby.png" alt="player sprite"/>
                    </div>

                    <!-- Кнопка прыжка зафиксирована внутри игрового мира под платформой -->
                    <button class="jump-btn dynamic-jump" id="jump">Прыжок</button>

                    <!-- Всплывающее окно -->
                    <dialog class="stage-popup" id="popup" aria-hidden="true">
                        <div class="popup-content">
                            <h3 id="popup-title">Этап</h3>
                            <div id="popup-text" class="popup-text"></div>
                            <div class="popup-actions">
                                <button id="popup-close" class="close-btn">Понятно</button>
                                <button id="reset" class="reset-btn">В начало</button>
                            </div>
                        </div>
                    </dialog>
                </div>
            </div>
        </main>

        <script src="Aidana.js" defer></script>
    </body>
</html>
