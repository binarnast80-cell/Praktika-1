<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Graduation cap base (mortarboard) — square plate -->
  <rect x="62" y="34" width="76" height="8" fill="#1A1A1A" transform="rotate(-2 100 38)"/>
  <!-- Cap top edges -->
  <path d="M 62 38 L 100 28 L 138 38 L 100 48 Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="round"/>
  <!-- Tassel (blue accent) -->
  <line x1="132" y1="38" x2="146" y2="62" stroke="#2563EB" stroke-width="2.5"/>
  <circle cx="146" cy="64" r="4" fill="#2563EB" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="100" cy="68" r="26" fill="#FCE9D6" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Eyes -->
  <circle cx="91" cy="70" r="2.5" fill="#1A1A1A"/>
  <circle cx="109" cy="70" r="2.5" fill="#1A1A1A"/>
  <!-- Wide proud smile -->
  <path d="M 90 82 Q 100 90 110 82" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <!-- Graduation gown -->
  <path d="M 60 100 L 75 95 L 100 100 L 125 95 L 140 100 L 145 165 L 55 165 Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Gown opening (V-shape with white shirt) -->
  <path d="M 85 100 L 100 130 L 115 100 Z" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="round"/>
  <!-- Blue stole/sash -->
  <path d="M 78 100 L 85 165 L 92 165 L 88 100 Z" fill="#2563EB" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="round"/>
  <path d="M 122 100 L 115 165 L 108 165 L 112 100 Z" fill="#2563EB" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="round"/>
  <!-- Diploma in hand -->
  <rect x="138" y="120" width="22" height="40" rx="1" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="142" y1="130" x2="156" y2="130" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="142" y1="138" x2="156" y2="138" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="142" y1="146" x2="156" y2="146" stroke="#1A1A1A" stroke-width="1.5"/>
</svg>
