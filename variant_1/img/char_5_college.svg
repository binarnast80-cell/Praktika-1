<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Head -->
  <circle cx="100" cy="60" r="27" fill="#FCE9D6" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Hair (slightly styled) -->
  <path d="M 76 50 Q 76 36 100 36 Q 124 36 124 50 L 124 56 Q 110 50 100 54 Q 90 50 76 56 Z" fill="#1A1A1A"/>
  <!-- Eyes -->
  <circle cx="91" cy="62" r="2.5" fill="#1A1A1A"/>
  <circle cx="109" cy="62" r="2.5" fill="#1A1A1A"/>
  <!-- Confident smile -->
  <path d="M 92 75 Q 100 80 108 75" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <!-- Body — collared shirt -->
  <rect x="68" y="95" width="64" height="65" rx="4" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Collar V -->
  <path d="M 88 95 L 100 110 L 112 95" fill="#F4F4F0" stroke="#1A1A1A" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Shirt buttons -->
  <circle cx="100" cy="125" r="1.5" fill="#1A1A1A"/>
  <circle cx="100" cy="140" r="1.5" fill="#1A1A1A"/>
  <!-- Left arm -->
  <rect x="62" y="100" width="10" height="42" rx="5" fill="#FCE9D6" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Right arm holding book -->
  <rect x="128" y="100" width="10" height="30" rx="5" fill="#FCE9D6" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Book in hand (blue accent) -->
  <rect x="118" y="130" width="40" height="30" rx="2" fill="#2563EB" stroke="#1A1A1A" stroke-width="2.5"/>
  <rect x="120" y="132" width="36" height="26" rx="1" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Book spine line -->
  <line x1="138" y1="130" x2="138" y2="160" stroke="#1A1A1A" stroke-width="1.5"/>
</svg>
