<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Путь Айдоса — Финансовый Центр</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FFFBF0;
            --brown: #3A1F00;
            --gold: #FFD21F;
            --sky: #5BB8FF;
            --red: #FF3B3B;
            --green: #2ECC40;
            --navy: #1A2E5A;
            --panel: #FFF8E1;
            --outline: 3px solid #1A1A1A;
            --shadow: 4px 4px 0px #1A1A1A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--cream);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ─────────────────────────── */
        #header {
            background: var(--navy);
            border-bottom: 4px solid #1A1A1A;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 1000;
        }
        #header h1 {
            font-family: 'Bangers', cursive;
            color: var(--gold);
            font-size: 1.6rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #000;
        }
        #header .sub {
            color: #aac4ff;
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: -2px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Step dots */
        #dots {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.2s;
        }
        .dot.done { background: rgba(255,210,31,0.5); }
        .dot.active { background: var(--gold); width: 28px; border-radius: 6px; }

        /* ── LAYOUT ─────────────────────────── */
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #map-wrap {
            flex: 1;
            position: relative;
        }
        #map { width: 100%; height: 100%; }

        /* ── SIDE PANEL ─────────────────────── */
        #panel {
            width: 320px;
            flex-shrink: 0;
            background: var(--panel);
            border-left: 4px solid #1A1A1A;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Comic halftone dots bg */
        #panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 12px 12px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── SLIDES ─────────────────────────── */
        #slides-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            padding: 16px 18px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateX(60px);
            transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.25,0.8,0.25,1);
            pointer-events: none;
            visibility: hidden;
            z-index: 1;
        }
        .slide.active {
            opacity: 1;
            transform: translateX(0) !important;
            pointer-events: auto;
            visibility: visible;
            z-index: 2;
        }
        .slide.s-exit-fwd {
            opacity: 0 !important;
            transform: translateX(-65px) !important;
            visibility: visible;
        }
        .slide.s-exit-bwd {
            opacity: 0 !important;
            transform: translateX(65px) !important;
            visibility: visible;
        }
        .slide.s-enter-fwd {
            opacity: 0;
            transform: translateX(65px);
            visibility: visible;
        }
        .slide.s-enter-bwd {
            opacity: 0;
            transform: translateX(-65px);
            visibility: visible;
        }

        /* ── CHARACTER ───────────────────────── */
        .char-wrap {
            width: 150px;
            height: 150px;
            position: relative;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .char-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        @keyframes hop {
            0%,100% { transform: translateY(0) rotate(0deg); }
            40% { transform: translateY(-8px) rotate(-2deg); }
            60% { transform: translateY(-6px) rotate(2deg); }
        }
        .char-wrap img { animation: hop 2.2s ease-in-out infinite; }

        /* Comic speech bubble */
        .bubble {
            position: absolute;
            top: -2px;
            right: -10px;
            background: white;
            border: 3px solid #1A1A1A;
            border-radius: 12px 12px 12px 0;
            padding: 4px 8px;
            font-size: 0.62rem;
            font-weight: 900;
            color: #1A1A1A;
            white-space: nowrap;
            box-shadow: 2px 2px 0 #1A1A1A;
            z-index: 2;
        }

        /* Age badge - comic style */
        .age-badge {
            background: var(--gold);
            border: 3px solid #1A1A1A;
            box-shadow: var(--shadow);
            font-family: 'Bangers', cursive;
            font-size: 1rem;
            letter-spacing: 1px;
            padding: 3px 14px;
            border-radius: 6px;
            color: #1A1A1A;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .slide h2 {
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: var(--navy);
            text-align: center;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
            line-height: 1.15;
            margin-bottom: 4px;
        }

        .loc-tag {
            background: var(--navy);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 4px;
            border: 2px solid #1A1A1A;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .slide p {
            font-size: 0.78rem;
            font-weight: 700;
            color: #2A1800;
            line-height: 1.45;
            text-align: center;
            max-width: 270px;
        }

        /* Skill tags comic style */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }
        .stag {
            font-size: 0.68rem;
            font-weight: 900;
            padding: 3px 10px;
            border: 2.5px solid #1A1A1A;
            border-radius: 5px;
            box-shadow: 2px 2px 0 #1A1A1A;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ── NAV ─────────────────────────────── */
        #nav {
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.6);
            border-top: 4px solid #1A1A1A;
            flex-shrink: 0;
            z-index: 2;
        }
        .nav-btn {
            width: 46px; height: 46px;
            background: var(--gold);
            border: 3px solid #1A1A1A;
            border-radius: 8px;
            box-shadow: var(--shadow);
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: 900;
            font-family: 'Nunito', sans-serif;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .nav-btn:hover { background: #FFE650; transform: translate(-1px,-1px); box-shadow: 5px 5px 0 #1A1A1A; }
        .nav-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #1A1A1A; }
        .nav-btn:disabled { background: #ccc; opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: var(--shadow); }

        #prog {
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--navy);
        }
        #prog small {
            font-family: 'Nunito', sans-serif;
            font-size: 0.65rem;
            font-weight: 800;
            display: block;
            text-align: center;
            color: #666;
            letter-spacing: 1px;
        }

        /* Leaflet popup comic */
        .leaflet-popup-content-wrapper {
            background: var(--panel) !important;
            border: 3px solid #1A1A1A !important;
            border-radius: 10px !important;
            box-shadow: 4px 4px 0 #1A1A1A !important;
        }
        .leaflet-popup-content {
            font-family: 'Nunito', sans-serif !important;
            font-weight: 800 !important;
            font-size: 0.8rem !important;
        }
        .leaflet-popup-tip-container { display: none; }

        /* Hint bar */
        #hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26,46,90,0.85);
            color: white;
            font-size: 0.68rem;
            font-weight: 800;
            padding: 5px 14px;
            border-radius: 20px;
            z-index: 100;
            pointer-events: none;
            transition: opacity 1s;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div id="header">
    <div>
        <div id="h-title" style="font-family:'Bangers',cursive;color:#FFD21F;font-size:1.5rem;letter-spacing:2px;text-shadow:2px 2px 0 #000">
            🗺️ ПУТЬ АЙДОСА
        </div>
        <div class="sub">Астана · от садика до Финансового Центра</div>
    </div>
    <div id="dots"></div>
</div>

<div id="main">
    <div id="map-wrap">
        <div id="map"></div>
        <div id="hint">← → клавиши или кнопки</div>
    </div>
    <div id="panel">
        <div id="slides-wrap"></div>
        <div id="nav">
            <button class="nav-btn" id="bp">◀</button>
            <div id="prog">
                <span><span id="cn">1</span>/<span id="tn">7</span></span>
                <small>ШАГ ПУТИ</small>
            </div>
            <button class="nav-btn" id="bn">▶</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
<script>
// ══════════════════════════════════════════════════
//  CHARACTER IMAGE FILES — замени пути на свои PNG
// ══════════════════════════════════════════════════
// Положи свои PNG рядом с HTML файлом и укажи имена ниже:
const CHAR_IMGS = [
    'C://Users//User//Downloads//char_1_sads.png',      // 1. Детский сад
    'C://Users//User//Downloads//char_2_schools.png',   // 2. Школа
    'C://Users//User//Downloads//char_3_musicss.png',    // 3. Муз. школа
    'C://Users//User//Downloads//char_4_martials.png',  // 4. Казақ күресі
    'C://Users//User//Downloads//char_5_colleges.png',  // 5. НИШ / Колледж
    'C://Users//User//Downloads//char_6_unis.png',      // 6. Университет
    'C://Users//User//Downloads//char_7_fcs.png',       // 7. Финансовый центр
];

// ══════════════════════════════════════════════════
//  WAYPOINTS
// ══════════════════════════════════════════════════
const WP = [
{
    key:'kg', emoji:'🧸',
    age:'4–6 лет', title:'ДЕТСКИЙ САД 🧸',
    loc:'Мкр. Сарыарка, Астана',
    desc:'Айдос делает первые шаги! Новые друзья, казахские сказки и первые слова на трёх языках. Мечты такие большие, как весь Казахстан!',
    skills:[{t:'Дружба',c:'#FF8C42',b:'#FFF3E8'},{t:'Қазақша',c:'#2ECC40',b:'#EDFFF0'},{t:'Творчество',c:'#6B3FA0',b:'#F5EEFF'}],
    latlng:[51.1390, 71.3850], zoom:14
},
{
    key:'sc', emoji:'📚',
    age:'7–11 лет', title:'НАЧАЛЬНАЯ ШКОЛА 📚',
    loc:'Школа №47, Левобережье',
    desc:'Первый звонок! Айдос в синей форме с большущим портфелем. Математика, русский, казахский — и первые пятёрки в дневнике.',
    skills:[{t:'Математика',c:'#1A2E5A',b:'#EEF2FF'},{t:'Чтение',c:'#FF3B3B',b:'#FFF0F0'},{t:'Спорт',c:'#2ECC40',b:'#EDFFF0'}],
    latlng:[51.1800, 71.4490], zoom:14
},
{
    key:'mu', emoji:'🎵',
    age:'10–14 лет', title:'МУЗ. ШКОЛА 🎵',
    loc:'Школа им. Курмангазы, Астана',
    desc:'По вечерам — домбра. Пальцы болят, зато кюй Курмангазы звучит всё лучше. Айдос учится слышать душу казахской музыки.',
    skills:[{t:'Домбра',c:'#6B3FA0',b:'#F5EEFF'},{t:'Нотная грамота',c:'#FFD21F',b:'#FFFBE8'},{t:'Дисциплина',c:'#3A7BD5',b:'#EEF5FF'}],
    latlng:[51.1650, 71.4550], zoom:14
},
{
    key:'ma', emoji:'🥋',
    age:'13–16 лет', title:'КАЗАҚ КҮРЕСІ 🥋',
    loc:'СК «Казахстан», Астана',
    desc:'Три раза в неделю — тренировки. Айдос — БАТЫР! Красный пояс, золото на городских соревнованиях. Воля + тело = победа!',
    skills:[{t:'Казақ Күресі',c:'#FF3B3B',b:'#FFF0F0'},{t:'Стратегия',c:'#1A2E5A',b:'#EEF2FF'},{t:'Характер',c:'#FFD21F',b:'#FFFBE8'}],
    latlng:[51.1320, 71.4050], zoom:13
},
{
    key:'co', emoji:'🎒',
    age:'16–18 лет', title:'НАЗАРБАЕВ ИНТ. ШКОЛА 🎒',
    loc:'НИШ, Астана',
    desc:'Время серьёзных решений. Айдос влюбился в экономику. Олимпиады, английский, программирование — всё ради большой мечты.',
    skills:[{t:'Экономика',c:'#3A7BD5',b:'#EEF5FF'},{t:'English',c:'#2ECC40',b:'#EDFFF0'},{t:'Лидерство',c:'#FF3B3B',b:'#FFF0F0'}],
    latlng:[51.0900, 71.4680], zoom:13
},
{
    key:'un', emoji:'🏛️',
    age:'18–22 лет', title:'НАЗАРБАЕВ УН-Т 🏛️',
    loc:'Назарбаев Университет, Астана',
    desc:'Назарбаев Университет — лучший в Центральной Азии. Финансы и банковское дело. Стажировки, конференции, международные программы.',
    skills:[{t:'Финансы',c:'#1A2E5A',b:'#EEF2FF'},{t:'Аналитика',c:'#FFD21F',b:'#FFFBE8'},{t:'Networking',c:'#2ECC40',b:'#EDFFF0'}],
    latlng:[51.0892, 71.4218], zoom:14
},
{
    key:'fc', emoji:'🏦',
    age:'23+ лет', title:'АО «ФИНАНСОВЫЙ ЦЕНТР» 🏦',
    loc:'ул. Мәңгілік Ел, 18, Астана',
    desc:'Айдос достиг своей мечты! АО «Финансовый центр» — инвестиции в образование и будущее Казахстана. Депозит AQYL, образовательные кредиты. Он сам теперь строит это будущее! 🇰🇿',
    skills:[{t:'Инвестиции',c:'#FFD21F',b:'#FFFBE8'},{t:'AQYL депозит',c:'#1A2E5A',b:'#EEF2FF'},{t:'Казахстан 2050',c:'#FF3B3B',b:'#FFF0F0'}],
    latlng:[51.0878, 71.4143], zoom:15
}
];

// ══════════════════════════════════════════════════
//  MAP SETUP
// ══════════════════════════════════════════════════
const map = L.map('map', {
    zoomControl: false,
    dragging: false,
    scrollWheelZoom: false,
    attributionControl: false
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { opacity: 1 }).addTo(map);
L.control.zoom({ position: 'topleft' }).addTo(map);
map.setView(WP[0].latlng, WP[0].zoom);

// Path line
L.polyline(WP.map(w => w.latlng), {
    color: '#1A1A1A',
    weight: 4,
    opacity: 0.5,
    dashArray: '10, 7'
}).addTo(map);

// Markers
function mkIcon(emoji, active) {
    const s = active ? 50 : 36;
    const bg = active ? '#FFD21F' : '#FFF8E1';
    const bdr = active ? '4px solid #1A1A1A' : '3px solid #1A1A1A';
    const sh = active ? '3px 3px 0 #1A1A1A' : '2px 2px 0 #1A1A1A';
    return L.divIcon({
        className: '',
        html: `<div style="width:${s}px;height:${s}px;background:${bg};border:${bdr};border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:${active?22:15}px;box-shadow:${sh};cursor:pointer;">${emoji}</div>`,
        iconSize: [s, s],
        iconAnchor: [s/2, s/2]
    });
}
const markers = WP.map((w, i) => {
    const m = L.marker(w.latlng, { icon: mkIcon(w.emoji, i===0) })
        .addTo(map)
        .bindTooltip(w.title, { direction: 'top' });
    m.on('click', () => goTo(i));
    return m;
});

// ══════════════════════════════════════════════════
//  BUILD SLIDES
// ══════════════════════════════════════════════════
const sw = document.getElementById('slides-wrap');
WP.forEach((w, i) => {
    const d = document.createElement('div');
    d.className = 'slide' + (i===0?' active':'');
    d.id = 'sl'+i;

    const tags = w.skills.map(s =>
        `<span class="stag" style="color:${s.c};background:${s.b};border-color:${s.c}">${s.t}</span>`
    ).join('');

    // bubble texts
    const bubbles = ['Привет!', 'Пятёрка!', '♪ кюй ♪', 'Батыр!', 'Олимп!', 'Диплом!', 'Мечта!'];

    d.innerHTML = `
      <div class="char-wrap">
        <img src="${CHAR_IMGS[i]}" alt="Айдос" style="width:100%;height:100%;object-fit:contain;" onerror="this.style.display='none'">
        <div class="bubble">${bubbles[i]}</div>
      </div>
      <div class="age-badge">${w.age}</div>
      <h2>${w.title}</h2>
      <div class="loc-tag">📍 ${w.loc}</div>
      <p>${w.desc}</p>
      <div class="skills">${tags}</div>
    `;
    sw.appendChild(d);
});

// ══════════════════════════════════════════════════
//  DOTS
// ══════════════════════════════════════════════════
const dotsEl = document.getElementById('dots');
WP.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot'+(i===0?' active':'');
    d.onclick = () => goTo(i);
    dotsEl.appendChild(d);
});

// ══════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════
let cur = 0;
const slides = () => document.querySelectorAll('.slide');
const dots = () => document.querySelectorAll('.dot');
const bp = document.getElementById('bp');
const bn = document.getElementById('bn');

function goTo(idx) {
    if (idx === cur) return;
    const fwd = idx > cur;
    const allSlides = document.querySelectorAll('.slide');
    const allDots   = document.querySelectorAll('.dot');

    const prevSlide = allSlides[cur];
    const nextSlide = allSlides[idx];

    // 1. Prepare incoming slide (off-screen, no transition yet)
    nextSlide.style.transition = 'none';
    nextSlide.classList.remove('active', 's-exit-fwd', 's-exit-bwd', 's-enter-fwd', 's-enter-bwd');
    nextSlide.classList.add(fwd ? 's-enter-fwd' : 's-enter-bwd');
    nextSlide.style.visibility = 'visible';

    // force reflow so browser registers starting position
    void nextSlide.offsetWidth;

    // 2. Animate outgoing slide
    prevSlide.classList.remove('active');
    prevSlide.classList.add(fwd ? 's-exit-fwd' : 's-exit-bwd');

    // 3. Animate incoming slide into place
    nextSlide.style.transition = '';
    nextSlide.classList.remove('s-enter-fwd', 's-enter-bwd');
    nextSlide.classList.add('active');

    // 4. Cleanup outgoing after transition
    setTimeout(() => {
        prevSlide.classList.remove('s-exit-fwd', 's-exit-bwd');
        prevSlide.style.visibility = '';
    }, 380);

    // 5. Dots
    allDots[cur].classList.remove('active');
    if (fwd) {
        allDots[cur].classList.add('done');
    } else {
        // going back — remove done from cur and everything after idx
        for (let k = idx; k <= cur; k++) {
            allDots[k].classList.remove('done', 'active');
        }
    }
    allDots[idx].classList.add('active');

    // 6. Map markers
    markers[cur].setIcon(mkIcon(WP[cur].emoji, false));
    markers[idx].setIcon(mkIcon(WP[idx].emoji, true));

    cur = idx;

    // 7. Fly map
    map.flyTo(WP[cur].latlng, WP[cur].zoom, { duration: 1.2, easeLinearity: 0.4 });

    // 8. Update UI
    document.getElementById('cn').textContent = cur + 1;
    bp.disabled = cur === 0;
    bn.disabled = cur === WP.length - 1;
}

bp.addEventListener('click', () => { if (cur>0) goTo(cur-1); });
bn.addEventListener('click', () => { if (cur<WP.length-1) goTo(cur+1); });
document.addEventListener('keydown', e => {
    if (e.key==='ArrowRight' && cur<WP.length-1) goTo(cur+1);
    if (e.key==='ArrowLeft' && cur>0) goTo(cur-1);
});

document.getElementById('tn').textContent = WP.length;
bp.disabled = true;

// Fade hint
const hint = document.getElementById('hint');
setTimeout(() => { hint.style.opacity='0'; }, 4500);
document.addEventListener('click', () => { hint.style.opacity='0'; }, {once:true});
</script>
