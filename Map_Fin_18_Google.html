<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Путь Айдоса</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
    <!-- Friendly Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Icons Rounded for friendly UI -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
    <style>
        :root {
            /* Friendly, bright, professional palette */
            --primary: #3B82F6;        /* Bright blue */
            --primary-light: #DBEAFE;  /* Very light blue */
            --secondary: #F59E0B;      /* Friendly amber */
            --secondary-light: #FEF3C7;/* Very light amber */
            --success: #10B981;        /* Fresh green */
            --success-light: #D1FAE5;
            --accent: #EC4899;         /* Playful pink */
            
            --bg-panel: #FFFFFF;
            --bg-page: #F8FAFC;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            
            /* Soft, playful shadows */
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.05);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 16px 32px rgba(15, 23, 42, 0.12);
            --shadow-floating: 0 20px 40px rgba(59, 130, 246, 0.15);
            
            /* Bouncy animations */
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-page);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* ── LAYOUT (MAP FULLSCREEN) ── */
        #map-wrap {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #E2E8F0; /* Fallback before map loads */
        }
        #map { width: 100%; height: 100%; }

        /* ── HEADER (FLOATING PILL) ── */
        #header {
            position: absolute;
            top: 24px;
            left: 24px;
            right: 420px; /* Space for right panel */
            background: var(--bg-panel);
            border: 2px solid var(--border);
            box-shadow: var(--shadow-md);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            border-radius: 100px; /* Pill shape */
            transition: box-shadow 0.3s var(--ease-smooth), transform 0.3s var(--ease-bounce);
        }
        
        #header:hover {
            box-shadow: var(--shadow-floating);
            transform: translateY(-2px);
        }
        
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.2s var(--ease-bounce);
        }
        
        .logo-wrap:hover { transform: scale(1.05); }
        .logo-wrap:active { transform: scale(0.95); }

        .logo-icon {
            font-size: 36px;
            color: var(--primary);
            background: var(--primary-light);
            padding: 8px;
            border-radius: 50%;
        }

        #header h1 {
            font-family: 'Nunito', sans-serif;
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        #header .sub {
            color: var(--text-muted);
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 4px;
        }

        /* Stepper Nodes */
        #dots {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--bg-page);
            padding: 8px 16px;
            border-radius: 100px;
        }
        
        .dot {
            width: 12px; height: 12px;
            background: var(--border);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s var(--ease-bounce);
        }
        
        .dot.done { 
            background: var(--primary); 
            opacity: 0.4;
        }
        
        .dot.active { 
            background: var(--primary); 
            width: 24px; height: 12px;
            border-radius: 100px; /* Elongated pill for active */
            box-shadow: 0 4px 8px rgba(59, 130, 246, 0.4);
        }
        
        .dot:hover {
            background: var(--secondary);
            transform: scale(1.3);
        }

        /* ── SIDE PANEL (FLOATING CARD) ── */
        #panel {
            position: absolute;
            right: 24px;
            top: 24px;
            bottom: 24px;
            width: 380px;
            background: var(--bg-panel);
            border: 2px solid var(--border);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            border-radius: 32px;
            overflow: hidden;
            transition: box-shadow 0.3s, transform 0.3s var(--ease-bounce);
        }
        
        #panel:hover {
            box-shadow: var(--shadow-floating);
            transform: translateY(-4px);
        }

        /* ── SLIDES ─────────────────────────── */
        #slides-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-panel);
        }

        .slide {
            position: absolute;
            inset: 0;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 16px;
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: all 0.4s var(--ease-bounce);
            pointer-events: none;
            visibility: hidden;
            z-index: 1;
            overflow-y: auto;
        }
        .slide.active {
            opacity: 1;
            transform: scale(1) translateY(0) !important;
            pointer-events: auto;
            visibility: visible;
            z-index: 2;
        }
        .slide.s-exit-fwd { opacity: 0 !important; transform: scale(0.95) translateX(-40px) !important; visibility: visible; }
        .slide.s-exit-bwd { opacity: 0 !important; transform: scale(0.95) translateX(40px) !important; visibility: visible; }
        .slide.s-enter-fwd { opacity: 0; transform: scale(0.95) translateX(40px); visibility: visible; }
        .slide.s-enter-bwd { opacity: 0; transform: scale(0.95) translateX(-40px); visibility: visible; }

        /* Custom Scrollbar */
        .slide::-webkit-scrollbar { width: 6px; }
        .slide::-webkit-scrollbar-track { background: transparent; }
        .slide::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .slide::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ── CHARACTER ── */
        .char-wrap {
            width: var(--char-size, 160px);
            height: var(--char-size, 160px);
            position: relative;
            flex-shrink: 0;
            margin-bottom: 8px;
            cursor: pointer;
            transition: transform 0.3s var(--ease-bounce);
        }
        .char-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: soft-float 4s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }
        
        .char-wrap:hover { transform: scale(1.1) rotate(5deg); }
        .char-wrap:active { transform: scale(0.9); }

        @keyframes soft-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Friendly bubble */
        .bubble {
            position: absolute;
            top: 0px;
            right: -20px;
            background: #FFFFFF;
            border: 2px solid var(--border);
            border-radius: 20px 20px 20px 0;
            padding: 8px 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
            z-index: 2;
            animation: pop-in 0.4s var(--ease-bounce) both;
            transform-origin: bottom left;
        }

        @keyframes pop-in {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Age badge */
        .age-badge {
            background: var(--secondary-light);
            color: #D97706; /* Darker amber for contrast */
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 100px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: var(--shadow-sm);
            margin-bottom: -4px;
        }

        .slide h2 {
            font-family: 'Nunito', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-main);
            text-align: center;
            line-height: 1.2;
            margin-bottom: 0;
        }

        .loc-tag {
            color: var(--text-muted);
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-page);
            padding: 4px 12px;
            border-radius: 100px;
        }

        /* ── PER-SLIDE CHAR SIZE ── */
        #sl_rd  { --char-size: 150px; }
        #sl_kg  { --char-size: 160px; }
        #sl_kr1 { --char-size: 150px; }
        #sl_sc  { --char-size: 155px; }
        #sl_kr2 { --char-size: 150px; }
        #sl_co  { --char-size: 155px; }
        #sl_kr3 { --char-size: 160px; }
        #sl_ob1 { --char-size: 155px; }
        #sl_un  { --char-size: 160px; }
        #sl_ob2 { --char-size: 155px; }
        #sl_fc  { --char-size: 160px; }

        /* ── MAP CHOICE POPUP ── */
        #map-popup {
            position: absolute;
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            transform: translate(-50%, calc(-100% - 32px));
        }
        #map-popup.visible { display: flex; pointer-events: auto; }
        
        #map-popup-inner {
            position: relative;
            background: var(--bg-panel);
            border: 2px solid var(--border);
            box-shadow: var(--shadow-lg);
            padding: 16px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 220px;
            animation: pop-up 0.3s var(--ease-bounce) both;
            transform-origin: bottom center;
        }
        
        #map-popup-inner .popup-title {
            color: var(--text-muted);
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
        }
        
        @keyframes pop-up {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        #map-popup-inner::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border: 10px solid transparent;
            border-top-color: var(--bg-panel);
            filter: drop-shadow(0 4px 4px rgba(15, 23, 42, 0.05));
        }
        
        #map-popup-inner::before {
            content: '';
            position: absolute;
            bottom: -13px;
            left: 50%;
            transform: translateX(-50%);
            border: 11px solid transparent;
            border-top-color: var(--border);
            z-index: -1;
        }

        .map-choice-btn {
            background: var(--bg-page);
            border: 2px solid var(--border);
            border-radius: 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            color: var(--primary);
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s var(--ease-bounce);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        
        .map-choice-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #FFFFFF;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.2);
        }

        .map-choice-btn:active { transform: scale(0.95); }

        .finish-badge {
            background: var(--success-light);
            color: #047857; /* Dark emerald */
            font-family: 'Nunito', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            padding: 12px 24px;
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-sm);
        }

        .slide p {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
            line-height: 1.6;
            text-align: center;
            margin: 4px 0;
        }

        /* Skill tags (Friendly Badges) */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 8px;
        }
        .stag {
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s var(--ease-bounce);
            cursor: pointer;
        }
        .stag:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: var(--shadow-md);
        }

        /* ── FC FOOTNOTE (Friendly Card) ── */
        .fc-strip {
            width: 100%;
            background: var(--primary-light);
            border-radius: 20px;
            padding: 16px;
            margin-top: 12px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            transition: all 0.3s var(--ease-bounce);
            cursor: pointer;
        }
        .fc-strip:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            background: #EFF6FF;
        }
        .fc-strip:active { transform: scale(0.98); }
        
        .fc-strip-icon {
            font-size: 24px;
            color: var(--primary);
            background: #FFFFFF;
            padding: 8px;
            border-radius: 50%;
            box-shadow: var(--shadow-sm);
        }

        .fc-strip-text {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.5;
        }

        /* ── NAV ─────────────────────────────── */
        #nav {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-page);
            border-top: 2px solid var(--border);
            flex-shrink: 0;
            z-index: 2;
            border-radius: 0 0 32px 32px;
        }
        
        .nav-btn {
            width: 56px; height: 56px;
            background: #FFFFFF;
            border: 2px solid var(--border);
            border-radius: 50%; /* Circle buttons */
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-bounce);
            box-shadow: var(--shadow-sm);
        }

        .nav-btn .material-symbols-rounded { font-size: 28px; transition: transform 0.2s; }
        
        .nav-btn:hover:not(:disabled) { 
            background: var(--primary); 
            border-color: var(--primary);
            color: #FFFFFF;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
            transform: scale(1.1);
        }
        
        .nav-btn:active:not(:disabled) { transform: scale(0.9); }
        
        .nav-btn:disabled { 
            background: var(--bg-page);
            color: #CBD5E1;
            border-color: #E2E8F0;
            box-shadow: none;
            cursor: not-allowed; 
        }

        #prog {
            font-family: 'Nunito', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--text-main);
            text-align: center;
        }
        #prog small {
            display: block;
            font-family: 'Poppins', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: -2px;
        }

        /* Leaflet popup */
        .leaflet-popup-content-wrapper {
            background: var(--bg-panel) !important;
            border-radius: 16px !important;
            box-shadow: var(--shadow-md) !important;
            padding: 8px !important;
            border: 2px solid var(--border);
        }
        .leaflet-popup-content {
            font-family: 'Nunito', sans-serif !important;
            font-weight: 800 !important;
            font-size: 0.9rem !important;
            color: var(--text-main) !important;
            margin: 4px 8px !important;
            text-align: center;
        }
        .leaflet-popup-tip {
            background: var(--bg-panel) !important;
            box-shadow: none !important;
            border-bottom: 2px solid var(--border);
            border-right: 2px solid var(--border);
        }

        /* Intuitive Hint bar */
        #hint {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--secondary);
            border: 2px solid #D97706;
            color: #FFFFFF;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            padding: 16px 32px;
            border-radius: 100px;
            z-index: 1000;
            pointer-events: none;
            transition: all 0.4s var(--ease-bounce);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: float-hint 3s infinite ease-in-out;
        }
        
        @keyframes float-hint {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -10px); }
        }

        #hint.hide {
            opacity: 0;
            transform: translate(-50%, 40px) scale(0.8) !important;
            pointer-events: none;
        }

        /* Custom Marker Container (Friendly Circles) */
        .md-marker-wrap {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--ease-bounce);
            position: relative;
            cursor: pointer;
            background: #FFFFFF;
            border: 3px solid var(--border);
            box-shadow: var(--shadow-sm);
            color: var(--text-main);
        }
        
        .md-marker-wrap:hover {
            transform: scale(1.2) translateY(-4px) !important;
            box-shadow: var(--shadow-md) !important;
            border-color: var(--primary);
            z-index: 1000;
        }
        
        .md-marker-wrap:active {
            transform: scale(0.9) !important;
        }
        
        .md-marker-wrap.active-node {
            background: var(--primary);
            border-color: #FFFFFF;
            color: #FFFFFF;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }
        
        /* Pulse for next available nodes */
        .md-marker-wrap.next-node::after {
            content: '';
            position: absolute;
            inset: -8px;
            border: 3px solid var(--secondary);
            border-radius: 50%;
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="map-wrap">
    <div id="map"></div>
    <div id="map-popup"><div id="map-popup-inner"></div></div>
    <!-- Obvious friendly hint -->
    <div id="hint">
        <span class="material-symbols-rounded" style="font-size: 28px;">touch_app</span> 
        <span id="hint-text">Нажмите на пульсирующий маркер, чтобы выбрать путь!</span>
    </div>
</div>

<div id="header">
    <div class="logo-wrap" onclick="location.reload()" title="Начать заново">
        <span class="material-symbols-rounded logo-icon">explore</span>
        <div>
            <h1>Путь Айдоса</h1>
            <div class="sub">Шаг за шагом к успеху</div>
        </div>
    </div>
    <div id="dots"></div>
</div>

<div id="panel">
    <div id="slides-wrap"></div>
    <div id="nav">
        <button class="nav-btn" id="bp" title="Назад"><span class="material-symbols-rounded">arrow_back</span></button>
        <div id="prog">
            <span><span id="cn" style="color:var(--primary);">1</span> / <span id="tn">?</span></span>
            <small>Шаг пути</small>
        </div>
        <button class="nav-btn" id="bn" title="Вперед"><span class="material-symbols-rounded">arrow_forward</span></button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
<script>
// ══════════════════════════════════════════════════
//  CHARACTER IMAGE FILES
// ══════════════════════════════════════════════════
const CHAR_IMGS = [
    'C://Users//User//Downloads//char_1_sads.png',      
    'C://Users//User//Downloads//char_2_schools.png',   
    'C://Users//User//Downloads//char_3_musicss.png',   
    'C://Users//User//Downloads//char_4_martials.png',  
    'C://Users//User//Downloads//char_5_colleges.png',  
    'C://Users//User//Downloads//char_6_unis.png',      
    'C://Users//User//Downloads//char_7_fcs.png',       
];

// ══════════════════════════════════════════════════
//  BRANCHING NODE GRAPH
// ══════════════════════════════════════════════════
const NODES = {
  rd: {
    key:'rd', emoji:'🍼',
    age:'0 лет', title:'Роддом',
    charImg: CHAR_IMGS[0],
    bubble:'Уа-уа!',
    loc:'Роддом №1, Астана',
    desc:'Айдос только появился на свет — крошечный, громкий, весь в будущем! Родители ещё не знают, каким он вырастет. Но уже сейчас можно сделать первый шаг.',
    fc:'Открыт депозит на новорождённого → государство зачислило стартовые 235 920 ₸.',
    skills:[{t:'Семья',c:'#EC4899',b:'#FCE7F3'},{t:'Первый вдох',c:'#3B82F6',b:'#DBEAFE'}],
    latlng:[51.1700, 71.4200], zoom:13,
    next:[{key:'kg', label:'В садик'}]
  },
  kg: {
    key:'kg', emoji:'🧸',
    age:'3–6 лет', title:'Детский сад',
    charImg: CHAR_IMGS[0],

// ══════════════════════════════════════════════════
//  MAP SETUP (FRIENDLY LIGHT MODE)
// ══════════════════════════════════════════════════
const map = L.map('map', {
    zoomControl: false,
    dragging: false,
    scrollWheelZoom: false,
    attributionControl: false
});

// CartoDB Voyager tiles - bright and colorful
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { 
    opacity: 1,
    subdomains: 'abcd',
    maxZoom: 19
}).addTo(map);

map.setView(NODES.rd.latlng, NODES.rd.zoom);

// Draw all connection lines
const CONNECTIONS = [
  ['rd','kg'],['kg','kr1'],['kg','sc'],['kr1','sc'],
  ['sc','kr2'],['sc','co'],['kr2','co'],
  ['co','kr3'],['co','ob1'],['co','un'],
  ['kr3','ob1'],['kr3','un'],
  ['ob1','un'],
  ['un','ob2'],['un','fc'],
  ['ob2','fc']
];
const lineObjs = {};
CONNECTIONS.forEach(([a,b]) => {
  const line = L.polyline([NODES[a].latlng, NODES[b].latlng], {
    color: '#CBD5E1', weight: 4, opacity: 0.8, dashArray: '8,8', lineCap: 'round'
  }).addTo(map);
  lineObjs[a+'_'+b] = line;
});

function mkIcon(emoji, active, isNext) {
    const s = active ? 56 : 42;
    let addClass = active ? ' active-node' : '';
    if (isNext) addClass += ' next-node';
    
    return L.divIcon({
        className: '',
        html: `<div class="md-marker-wrap${addClass}" style="font-size:${active?28:20}px;">${emoji}</div>`,
        iconSize: [s, s],
        iconAnchor: [s/2, s/2]
    });
}

// Create markers
const markers = {};
Object.values(NODES).forEach(w => {
  const m = L.marker(w.latlng, { icon: mkIcon(w.emoji, false, false) })
    .addTo(map)
    .bindTooltip(`<b>${w.title}</b>`, { direction: 'top', offset: [0, -10] });
    
  m.on('click', () => {
    const curNode = NODES[history[history.length-1]];
    if (curNode.next.some(n => n.key === w.key) || w.key === history[history.length-1]) {
      goTo(w.key);
    }
  });
  markers[w.key] = m;
});


// Highlight active path line
function highlightLine(fromKey, toKey) {
  const k1 = fromKey+'_'+toKey;
  const k2 = toKey+'_'+fromKey;
  const line = lineObjs[k1] || lineObjs[k2];
  if (line) {
    line.setStyle({ color: '#3B82F6', weight: 6, opacity: 1, dashArray: 'none' });
  }
}

// ══════════════════════════════════════════════════
//  BUILD SLIDES
// ══════════════════════════════════════════════════
const sw = document.getElementById('slides-wrap');
Object.values(NODES).forEach((w) => {
    const d = document.createElement('div');
    d.className = 'slide' + (w.key==='rd'?' active':'');
    d.id = 'sl_'+w.key;

    const tags = w.skills ? w.skills.map(s =>
        `<span class="stag" style="color:${s.c};background:${s.b};"><span class="material-symbols-rounded" style="font-size:18px;">star</span> ${s.t}</span>`
    ).join('') : '';

    const locHtml = w.loc ? `<div class="loc-tag"><span class="material-symbols-rounded" style="font-size:18px; color:var(--primary);">location_on</span> ${w.loc}</div>` : '';
    const skillsHtml = w.skills ? `<div class="skills">${tags}</div>` : '';
    d.innerHTML = `
      <div class="char-wrap">
        <img src="${w.charImg}" alt="Айдос" onerror="this.style.display='none'">
        <div class="bubble">${w.bubble}</div>
      </div>
      <div class="age-badge">${w.age}</div>
      <h2>${w.title}</h2>
      ${locHtml}
      <p>${w.desc}</p>
      ${skillsHtml}
      <div class="fc-strip">
        <span class="material-symbols-rounded fc-strip-icon">account_balance</span>
        <div class="fc-strip-text">${w.fc}</div>
      </div>
      ${w.next.length === 0 ? '<div style="margin-top:16px"><span class="finish-badge"><span class="material-symbols-rounded">emoji_events</span> ПУТЬ ПРОЙДЕН!</span></div>' : ''}
    `;
    sw.appendChild(d);
});

// ══════════════════════════════════════════════════
//  MAP CHOICE POPUP & HINTS
// ══════════════════════════════════════════════════
const mapPopup = document.getElementById('map-popup');
const mapPopupInner = document.getElementById('map-popup-inner');
const hintEl = document.getElementById('hint');
const hintText = document.getElementById('hint-text');

function updateHintState(key) {
    const node = NODES[key];
    
    // Clear previous next-node pulses
    Object.values(markers).forEach(m => {
        const iconDiv = m.getElement()?.querySelector('.md-marker-wrap');
        if (iconDiv) iconDiv.classList.remove('next-node');
    });

    if (node.next.length > 0) {
        hintEl.classList.remove('hide');
        hintText.innerHTML = "Отлично! Теперь выберите следующий шаг на карте.";
        
        // Add pulse to available next options
        node.next.forEach(nx => {
            markers[nx.key].setIcon(mkIcon(NODES[nx.key].emoji, false, true));
        });
        
    } else {
        hintEl.classList.add('hide');
    }
}

function showMapPopup(key) {
  const node = NODES[key];
  mapPopupInner.innerHTML = '';

  if (node.next.length === 0) {
    mapPopup.classList.remove('visible');
    return;
  }

  const title = document.createElement('div');
  title.className = 'popup-title';
  title.innerHTML = 'КУДА ДАЛЬШЕ?';
  mapPopupInner.appendChild(title);

  node.next.forEach(nx => {
    const btn = document.createElement('button');
    btn.className = 'map-choice-btn';
    btn.innerHTML = `<span>${nx.label}</span><span class="material-symbols-rounded" style="font-size:24px;">arrow_circle_right</span>`;
    btn.onclick = () => goTo(nx.key);
    mapPopupInner.appendChild(btn);
  });

  const pt = map.latLngToContainerPoint(node.latlng);
  mapPopup.style.left = pt.x + 'px';
  mapPopup.style.top = pt.y + 'px';
  mapPopup.classList.add('visible');
  
  updateHintState(key);
}

function hideMapPopup() {
  mapPopup.classList.remove('visible');
  hintEl.classList.add('hide');
}

map.on('move zoom', () => {
  const curKey = history[history.length - 1];
  const node = NODES[curKey];
  if (node.next.length > 0 && mapPopup.classList.contains('visible')) {
    const pt = map.latLngToContainerPoint(node.latlng);
    mapPopup.style.left = pt.x + 'px';
    mapPopup.style.top = pt.y + 'px';
  }
});


let history = ['rd'];
const visited = new Set(['rd']);

const bp = document.getElementById('bp');
const bn = document.getElementById('bn');

function updateDots() {
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  history.forEach((key, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === history.length-1 ? ' active' : ' done');
    d.title = NODES[key].title;
    d.onclick = () => goBackTo(i);
    dotsEl.appendChild(d);
  });
}

function goTo(key) {
  const prevKey = history[history.length-1];
  if (key === prevKey) return;

  const prevSlide = document.getElementById('sl_'+prevKey);
  const nextSlide = document.getElementById('sl_'+key);

  nextSlide.style.transition = 'none';
  nextSlide.classList.remove('active','s-exit-fwd','s-exit-bwd','s-enter-fwd','s-enter-bwd');
  nextSlide.classList.add('s-enter-fwd');
  nextSlide.style.visibility = 'visible';
  void nextSlide.offsetWidth;
  prevSlide.classList.remove('active');
  prevSlide.classList.add('s-exit-fwd');
  nextSlide.style.transition = '';
  nextSlide.classList.remove('s-enter-fwd');
  nextSlide.classList.add('active');
  setTimeout(() => {
    prevSlide.classList.remove('s-exit-fwd','s-exit-bwd');
    prevSlide.style.visibility = '';
  }, 400);

  markers[prevKey].setIcon(mkIcon(NODES[prevKey].emoji, false, false));
  markers[key].setIcon(mkIcon(NODES[key].emoji, true, false));

  highlightLine(prevKey, key);

  history.push(key);
  visited.add(key);

  document.getElementById('cn').textContent = history.length;
  updateNavBtns();
  updateDots();

  map.flyTo(NODES[key].latlng, NODES[key].zoom, { duration: 1.2, easeLinearity: 0.4 });

  hideMapPopup();
  setTimeout(() => showMapPopup(key), 1300);
}

function goBackTo(idx) {
  if (idx >= history.length - 1) return;
  const key = history[idx];
  const prevKey = history[history.length-1];

  const prevSlide = document.getElementById('sl_'+prevKey);
  const nextSlide = document.getElementById('sl_'+key);

  nextSlide.style.transition = 'none';
  nextSlide.classList.remove('active','s-exit-fwd','s-exit-bwd','s-enter-fwd','s-enter-bwd');
  nextSlide.classList.add('s-enter-bwd');
  nextSlide.style.visibility = 'visible';
  void nextSlide.offsetWidth;
  prevSlide.classList.remove('active');
  prevSlide.classList.add('s-exit-bwd');
  nextSlide.style.transition = '';
  nextSlide.classList.remove('s-enter-bwd');
  nextSlide.classList.add('active');
  setTimeout(() => {
    prevSlide.classList.remove('s-exit-fwd','s-exit-bwd');
    prevSlide.style.visibility = '';
  }, 400);

  // Clear future path styles
  for (let k = idx+1; k < history.length; k++) {
    markers[history[k]].setIcon(mkIcon(NODES[history[k]].emoji, false, false));
    const a = history[k-1], b = history[k];
    const lk1 = a+'_'+b, lk2 = b+'_'+a;
    const line = lineObjs[lk1] || lineObjs[lk2];
    if (line) {
      line.setStyle({ color: '#CBD5E1', weight: 4, opacity: 0.8, dashArray: '8,8' });
    }
  }
  markers[key].setIcon(mkIcon(NODES[key].emoji, true, false));

  history = history.slice(0, idx+1);
  document.getElementById('cn').textContent = history.length;
  updateNavBtns();
  updateDots();
  map.flyTo(NODES[key].latlng, NODES[key].zoom, { duration: 1.2, easeLinearity: 0.4 });
  hideMapPopup();
  setTimeout(() => showMapPopup(key), 1300);
}

bp.addEventListener('click', () => { if (history.length > 1) goBackTo(history.length-2); });

function updateNavBtns() {
  bp.disabled = history.length <= 1;
  const curNode = NODES[history[history.length-1]];
  bn.disabled = curNode.next.length === 0;
}

bn.addEventListener('click', () => {
  const curNode = NODES[history[history.length-1]];
  if (curNode.next.length > 0) goTo(curNode.next[0].key);
});

document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft' && history.length > 1) goBackTo(history.length-2);
  if (e.key==='ArrowRight') {
    const curNode = NODES[history[history.length-1]];
    if (curNode.next.length === 1) goTo(curNode.next[0].key);
  }
});

document.getElementById('tn').textContent = '?';
document.getElementById('cn').textContent = '1';
bp.disabled = true;
updateNavBtns();

updateDots();
markers['rd'].setIcon(mkIcon(NODES['rd'].emoji, true, false));
setTimeout(() => showMapPopup('rd'), 500);

// Close hint on first interaction
document.addEventListener('click', () => { 
    if(history.length === 1 && !mapPopup.classList.contains('visible')) {
        hintEl.classList.add('hide'); 
    }
}, {once:true});
</script>
