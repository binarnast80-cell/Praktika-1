<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Head -->
  <circle cx="100" cy="65" r="28" fill="#FCE9D6" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Hair -->
  <path d="M 76 55 Q 76 38 100 38 Q 124 38 124 55 L 124 60 L 76 60 Z" fill="#1A1A1A"/>
  <!-- Eyes (focused, slightly closed for concentration) -->
  <path d="M 87 67 L 95 69" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 105 69 L 113 67" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Slight smile (concentration) -->
  <path d="M 95 80 L 105 80" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <!-- Body (apron-like) -->
  <rect x="68" y="100" width="64" height="60" rx="4" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Apron pocket -->
  <rect x="82" y="125" width="36" height="22" rx="2" fill="#F4F4F0" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Paint dots on apron -->
  <circle cx="78" cy="115" r="3" fill="#2563EB"/>
  <circle cx="125" cy="118" r="3" fill="#DC2626"/>
  <circle cx="90" cy="155" r="2.5" fill="#059669"/>
  <!-- Arms -->
  <rect x="62" y="105" width="10" height="40" rx="5" fill="#FCE9D6" stroke="#1A1A1A" stroke-width="2.5"/>
  <rect x="128" y="105" width="10" height="40" rx="5" fill="#FCE9D6" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Paintbrush in right hand -->
  <rect x="138" y="138" width="3" height="22" fill="#1A1A1A" transform="rotate(20 139 149)"/>
  <path d="M 145 158 L 152 164 L 148 168 L 142 161 Z" fill="#2563EB" stroke="#1A1A1A" stroke-width="1.5"/>
</svg>
