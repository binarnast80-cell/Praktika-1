<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Путь Айданы — Финансовый Центр</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
</head>
<body>

<div id="header">
    <div>
        <div id="h-title">Путь <span>Айданы</span></div>
        <div class="sub">Жизненный путь · от рождения до первой работы (23+)</div>
    </div>
    <div id="dots"></div>
</div>

<div id="main">
    <div id="timeline-wrap">
        <div id="timeline-scroll" class="timeline-scroll">
            <div id="timeline-track" class="timeline-track">
                <div class="timeline-line timeline-line--bg" aria-hidden="true"></div>
                <div id="timeline-line-fill" class="timeline-line timeline-line--fill" aria-hidden="true"></div>
                <div id="journey-walker" class="journey-walker journey-walker--motion-crawl" aria-hidden="true">
                    <span class="walker-fx walker-fx--a" aria-hidden="true"></span>
                    <span class="walker-fx walker-fx--b" aria-hidden="true"></span>
                    <span class="walker-fx walker-fx--c" aria-hidden="true"></span>
                    <div class="journey-walker-body">
                        <img id="walker-img" class="journey-walker-img" src="./image/baby.png" alt="Айдана">
                    </div>
                    <span class="journey-walker-shadow"></span>
                </div>
                <ol id="timeline-nodes" class="timeline-nodes" aria-label="Этапы жизненного пути"></ol>
            </div>
        </div>
        <div id="fireworks-overlay" class="fireworks-overlay" aria-hidden="true"></div>
    </div>

    <footer id="bottom-panel">
        <div id="slides-wrap"></div>
        <div id="step-choices" class="step-choices" aria-live="polite"></div>
        <div id="nav">
            <button class="nav-btn" id="bp" aria-label="Назад">◀</button>
            <div id="prog">
                <span><span id="cn">1</span>/<span id="tn">?</span></span>
                <small>ШАГ ПУТИ</small>
            </div>
            <button class="nav-btn" id="bn" aria-label="Далее">▶</button>
        </div>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
