
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Путь Айдоса — Финансовый Центр</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
</head>
<body>

<div id="header">
    <div>
        <div id="h-title">Путь <span>Айдоса</span></div>
        <div class="sub">Астана · от рождения до Финансового центра</div>
    </div>
    <div id="dots"></div>
</div>

<div id="main">
    <div id="map-wrap">
        <div id="map"></div>
        <div id="map-popup"><div id="map-popup-inner"></div></div>
        <div id="compact-step" aria-live="polite">
            <button type="button" id="compact-pin" class="compact-pin" aria-label="Приблизить и открыть описание шага">
                <span id="compact-pin-emoji"></span>
            </button>
            <div id="compact-step-expanded" class="compact-step-expanded">
            <button type="button" class="compact-nav-btn compact-nav-btn--side" id="cbp" aria-label="Предыдущий шаг">◀</button>
            <div id="compact-step-card">
                <div class="compact-step-top">
                    <span class="compact-age" id="compact-age"></span>
                    <span class="compact-emoji" id="compact-emoji"></span>
                </div>
                <h3 class="compact-title" id="compact-title"></h3>
                <p class="compact-desc" id="compact-desc"></p>
                <div class="compact-fc" id="compact-fc"></div>
                <div class="compact-choices" id="compact-choices"></div>
                <span class="compact-prog"><span id="ccn">1</span> · шаг пути</span>
            </div>
            <button type="button" class="compact-nav-btn compact-nav-btn--side" id="cbn" aria-label="Следующий шаг">▶</button>
            </div>
        </div>
        <button type="button" id="panel-toggle" class="panel-toggle" aria-label="Свернуть панель пути" aria-expanded="true" title="Свернуть панель">⟩</button>
        <div id="hint">Точка — следующий шаг · Карту можно двигать мышью и тачпадом</div>
    </div>
    <div id="panel">
        <div id="slides-wrap"></div>
        <div id="nav">
            <button class="nav-btn" id="bp" aria-label="Назад к предыдущему шагу">◀</button>
            <div id="prog">
                <span><span id="cn">1</span>/<span id="tn">?</span></span>
                <small>ШАГ ПУТИ</small>
            </div>
            <button class="nav-btn" id="bn" aria-label="Вперед к следующему шагу">▶</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
