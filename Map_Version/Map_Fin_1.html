<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Путь Айдоса — Астана</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FFF8EC;
            --warm-brown: #8B5E3C;
            --gold: #E8B84B;
            --sky: #87CEEB;
            --grass: #6DBF67;
            --coral: #FF7F5C;
            --navy: #2B4C8C;
            --paper: #FDEEC8;
            --ink: #3A2A14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* === HEADER === */
        #header {
            width: 100%;
            background: var(--navy);
            padding: 10px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 3px 12px rgba(0,0,0,0.2);
        }
        #header h1 {
            font-family: 'Baloo 2', cursive;
            color: var(--gold);
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        #header .subtitle {
            color: rgba(255,255,255,0.75);
            font-size: 0.75rem;
            font-weight: 600;
        }
        #step-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s;
            cursor: pointer;
        }
        .step-dot.active {
            background: var(--gold);
            width: 24px;
            border-radius: 5px;
        }
        .step-dot.done {
            background: rgba(232, 184, 75, 0.5);
        }

        /* === MAIN LAYOUT === */
        #main {
            display: flex;
            width: 100%;
            height: calc(100vh - 52px);
            position: relative;
        }

        /* === MAP === */
        #map {
            flex: 1;
            height: 100%;
            z-index: 1;
        }

        /* Map tiles cartoon style overlay */
        #map::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,248,236,0.15);
            pointer-events: none;
            z-index: 10;
        }

        /* === SIDE PANEL === */
        #side-panel {
            width: 340px;
            height: 100%;
            background: var(--paper);
            border-left: 3px solid var(--warm-brown);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 50;
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
        }

        /* Paper texture lines */
        #side-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(
                transparent,
                transparent 27px,
                rgba(139,94,60,0.07) 27px,
                rgba(139,94,60,0.07) 28px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* === SLIDES === */
        #slides-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            padding: 20px 22px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateX(60px);
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            pointer-events: none;
            z-index: 1;
        }

        .slide.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }
        .slide.exit-left {
            opacity: 0;
            transform: translateX(-60px);
        }

        /* Character illustration */
        .char-container {
            width: 160px;
            height: 160px;
            position: relative;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .char-container svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.12));
        }

        /* Bounce animation for character */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .char-container.bouncing svg {
            animation: bounce 2s ease-in-out infinite;
        }

        /* Stars / sparkle for character */
        .sparkle {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 1.2rem;
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .slide-age-badge {
            background: var(--gold);
            color: var(--ink);
            font-family: 'Baloo 2', cursive;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .slide h2 {
            font-family: 'Baloo 2', cursive;
            color: var(--warm-brown);
            font-size: 1.2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .slide .location-tag {
            font-size: 0.7rem;
            color: var(--navy);
            font-weight: 700;
            background: rgba(43,76,140,0.1);
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .slide p {
            font-size: 0.82rem;
            color: var(--ink);
            line-height: 1.5;
            text-align: center;
            max-width: 280px;
        }

        .slide .emoji-row {
            font-size: 1.3rem;
            margin: 8px 0;
            letter-spacing: 4px;
        }

        /* Skills tags */
        .skills-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }
        .skill-tag {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 12px;
            border: 2px solid;
        }

        /* === NAVIGATION === */
        #nav-area {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.5);
            border-top: 2px solid rgba(139,94,60,0.15);
            z-index: 2;
            flex-shrink: 0;
        }

        .nav-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid var(--warm-brown);
            background: white;
            color: var(--warm-brown);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Baloo 2', cursive;
            font-weight: 800;
            user-select: none;
        }
        .nav-btn:hover {
            background: var(--warm-brown);
            color: white;
            transform: scale(1.08);
        }
        .nav-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            transform: none;
        }
        .nav-btn:active {
            transform: scale(0.95);
        }

        #progress-text {
            font-family: 'Baloo 2', cursive;
            font-size: 0.85rem;
            color: var(--warm-brown);
            font-weight: 700;
            text-align: center;
        }
        #progress-text .progress-num {
            font-size: 1.4rem;
            color: var(--navy);
            display: block;
        }

        /* === MAP POPUP custom === */
        .leaflet-popup-content-wrapper {
            background: var(--paper) !important;
            border: 2px solid var(--warm-brown) !important;
            border-radius: 12px !important;
            font-family: 'Nunito', sans-serif !important;
        }
        .leaflet-popup-content {
            font-family: 'Nunito', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--ink);
        }
        .leaflet-popup-tip {
            background: var(--warm-brown) !important;
        }

        /* === DOTTED PATH LINE on map === */
        .path-line {
            stroke: var(--warm-brown);
            stroke-dasharray: 8, 5;
        }

        /* === KEYBOARD HINT === */
        #key-hint {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(43,76,140,0.85);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 20px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.8;
        }

        /* Decorative corner ornament */
        .ornament {
            position: absolute;
            opacity: 0.15;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="header">
    <div>
        <h1>🗺️ Путь Айдоса</h1>
        <div class="subtitle">Астана — от садика до финансового центра</div>
    </div>
    <div id="step-indicator"></div>
</div>

<div id="main">
    <div id="map"></div>
    <div id="side-panel">
        <div id="slides-wrapper">
            <!-- Slides injected by JS -->
        </div>
        <div id="nav-area">
            <button class="nav-btn" id="btn-prev">◀</button>
            <div id="progress-text">

                Шаг пути
            </div>
            <button class="nav-btn" id="btn-next">▶</button>
        </div>
    </div>
</div>

<div id="key-hint">← → клавиши или кнопки для навигации</div>

    const size = active ? 44 : 32;

    const shadow = active ? '0 4px 12px rgba(0,0,0,0.3)' : '0 2px 6px rgba(0,0,0,0.15)';
    return L.divIcon({
        className: '',
        html: `<div style="
            width:${size}px;height:${size}px;
            background:${bg};
            border:3px solid ${border};
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:${active ? 20 : 14}px;
            box-shadow:${shadow};
            transition:all 0.3s;
            cursor:pointer;
        ">${emoji}</div>`,
        iconSize: [size, size],
        iconAnchor: [size/2, size/2]
    });
}

// ============================================================
let current = 0;
const slides = document.querySelectorAll('.slide');
const dots = document.querySelectorAll('.step-dot');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');

function goTo(index) {
    if (index === current) return;
    const dir = index > current ? 1 : -1;

    // Exit current
    slides[current].classList.remove('active');
    slides[current].classList.add(dir > 0 ? 'exit-left' : '');
    setTimeout(() => slides[current].classList.remove('exit-left'), 500);

    // Update dots
    dots[current].classList.remove('active');
    dots[current].classList.add('done');
    if (index < current) {
        // going back - remove done from future ones
        for (let k = index; k <= current; k++) {
            dots[k].classList.remove('done', 'active');
        }
        dots[index].classList.add('active');
    } else {
        dots[index].classList.add('active');
    }

    // Update markers
    markers[current].setIcon(makeIcon(EMOJIS[current], false));
    markers[index].setIcon(makeIcon(EMOJIS[index], true));

    current = index;

    // Show new slide
    slides[current].classList.add('active');

    // Pan map
    map.flyTo(waypoints[current].location, waypoints[current].zoom, {
        duration: 1.2,
        easeLinearity: 0.5
    });

    // Update progress
    document.getElementById('cur').textContent = current + 1;
    btnPrev.disabled = current === 0;
    btnNext.disabled = current === waypoints.length - 1;
}

btnPrev.addEventListener('click', () => { if (current > 0) goTo(current - 1); });
btnNext.addEventListener('click', () => { if (current < waypoints.length - 1) goTo(current + 1); });

// Keyboard nav
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' && current < waypoints.length - 1) goTo(current + 1);
    if (e.key === 'ArrowLeft' && current > 0) goTo(current - 1);
});

// Init state
btnPrev.disabled = true;
document.getElementById('tot').textContent = waypoints.length;

// Hide key hint after first interaction
let hintShown = true;
const keyHint = document.getElementById('key-hint');
document.addEventListener('click', () => {
    if (hintShown) { keyHint.style.opacity = '0'; hintShown = false; }
}, { once: true });

setTimeout(() => { keyHint.style.opacity = '0'; }, 5000);
</script>
</body>
</html>
