<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Путь Айдоса — АО Финансовый Центр</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FFFBF0;
            --brown: #3A1F00;
            --gold: #FFD21F;
            --sky: #5BB8FF;
            --red: #FF3B3B;
            --green: #2ECC40;
            --navy: #1A2E5A;
            --panel: #FFF8E1;
            --outline: 3px solid #1A1A1A;
            --shadow: 4px 4px 0px #1A1A1A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--cream);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ─────────────────────────── */
        #header {
            background: var(--navy);
            border-bottom: 4px solid #1A1A1A;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 1000;
        }
        #header h1 {
            font-family: 'Bangers', cursive;
            color: var(--gold);
            font-size: 1.6rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #000;
        }
        #header .sub {
            color: #aac4ff;
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: -2px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Step dots */
        #dots {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.2s;
        }
        .dot.done { background: rgba(255,210,31,0.5); }
        .dot.active { background: var(--gold); width: 28px; border-radius: 6px; }

        /* ── LAYOUT ─────────────────────────── */
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #map-wrap {
            flex: 1;
            position: relative;
        }
        #map { width: 100%; height: 100%; }

        /* ── SIDE PANEL ─────────────────────── */
        #panel {
            width: 320px;
            flex-shrink: 0;
            background: var(--panel);
            border-left: 4px solid #1A1A1A;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Comic halftone dots bg */
        #panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 12px 12px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── SLIDES ─────────────────────────── */
        #slides-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            padding: 16px 18px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateX(80px);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.25,0.8,0.25,1);
            pointer-events: none;
            z-index: 1;
        }
        .slide.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }
        .slide.go-left {
            opacity: 0;
            transform: translateX(-80px);
        }

        /* ── CHARACTER ───────────────────────── */
        .char-wrap {
            width: 150px;
            height: 150px;
            position: relative;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .char-wrap svg {
            width: 100%;
            height: 100%;
        }
        @keyframes hop {
            0%,100% { transform: translateY(0) rotate(0deg); }
            40% { transform: translateY(-8px) rotate(-2deg); }
            60% { transform: translateY(-6px) rotate(2deg); }
        }
        .char-wrap svg { animation: hop 2.2s ease-in-out infinite; }

        /* Comic speech bubble */
        .bubble {
            position: absolute;
            top: -2px;
            right: -10px;
            background: white;
            border: 3px solid #1A1A1A;
            border-radius: 12px 12px 12px 0;
            padding: 4px 8px;
            font-size: 0.62rem;
            font-weight: 900;
            color: #1A1A1A;
            white-space: nowrap;
            box-shadow: 2px 2px 0 #1A1A1A;
            z-index: 2;
        }

        /* Age badge - comic style */
        .age-badge {
            background: var(--gold);
            border: 3px solid #1A1A1A;
            box-shadow: var(--shadow);
            font-family: 'Bangers', cursive;
            font-size: 1rem;
            letter-spacing: 1px;
            padding: 3px 14px;
            border-radius: 6px;
            color: #1A1A1A;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .slide h2 {
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: var(--navy);
            text-align: center;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
            line-height: 1.15;
            margin-bottom: 4px;
        }

        .loc-tag {
            background: var(--navy);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 4px;
            border: 2px solid #1A1A1A;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .slide p {
            font-size: 0.78rem;
            font-weight: 700;
            color: #2A1800;
            line-height: 1.45;
            text-align: center;
            max-width: 270px;
        }

        /* Skill tags comic style */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }
        .stag {
            font-size: 0.68rem;
            font-weight: 900;
            padding: 3px 10px;
            border: 2.5px solid #1A1A1A;
            border-radius: 5px;
            box-shadow: 2px 2px 0 #1A1A1A;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ── NAV ─────────────────────────────── */
        #nav {
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.6);
            border-top: 4px solid #1A1A1A;
            flex-shrink: 0;
            z-index: 2;
        }
        .nav-btn {
            width: 46px; height: 46px;
            background: var(--gold);
            border: 3px solid #1A1A1A;
            border-radius: 8px;
            box-shadow: var(--shadow);
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: 900;
            font-family: 'Nunito', sans-serif;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .nav-btn:hover { background: #FFE650; transform: translate(-1px,-1px); box-shadow: 5px 5px 0 #1A1A1A; }
        .nav-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #1A1A1A; }
        .nav-btn:disabled { background: #ccc; opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: var(--shadow); }

        #prog {
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--navy);
        }
        #prog small {
            font-family: 'Nunito', sans-serif;
            font-size: 0.65rem;
            font-weight: 800;
            display: block;
            text-align: center;
            color: #666;
            letter-spacing: 1px;
        }

        /* Leaflet popup comic */
        .leaflet-popup-content-wrapper {
            background: var(--panel) !important;
            border: 3px solid #1A1A1A !important;
            border-radius: 10px !important;
            box-shadow: 4px 4px 0 #1A1A1A !important;
        }
        .leaflet-popup-content {
            font-family: 'Nunito', sans-serif !important;
            font-weight: 800 !important;
            font-size: 0.8rem !important;
        }
        .leaflet-popup-tip-container { display: none; }

        /* Hint bar */
        #hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26,46,90,0.85);
            color: white;
            font-size: 0.68rem;
            font-weight: 800;
            padding: 5px 14px;
            border-radius: 20px;
            z-index: 100;
            pointer-events: none;
            transition: opacity 1s;
            letter-spacing: 0.5px;
        }
    </style>
</head>

    const bdr = active ? '4px solid #1A1A1A' : '3px solid #1A1A1A';
    const sh = active ? '3px 3px 0 #1A1A1A' : '2px 2px 0 #1A1A1A';
    return L.divIcon({
        className: '',
        html: `<div style="width:${s}px;height:${s}px;background:${bg};border:${bdr};border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:${active?22:15}px;box-shadow:${sh};cursor:pointer;">${emoji}</div>`,
        iconSize: [s, s],
        iconAnchor: [s/2, s/2]
    });
}
const markers = WP.map((w, i) => {
    const m = L.marker(w.latlng, { icon: mkIcon(w.emoji, i===0) })
        .addTo(map)
        .bindTooltip(w.title, { direction: 'top' });
    m.on('click', () => goTo(i));
    return m;
});

// ══════════════════════════════════════════════════
//  BUILD SLIDES
// ══════════════════════════════════════════════════
const sw = document.getElementById('slides-wrap');
WP.forEach((w, i) => {
    const d = document.createElement('div');
    d.className = 'slide' + (i===0?' active':'');
    d.id = 'sl'+i;

    const tags = w.skills.map(s =>
        `<span class="stag" style="color:${s.c};background:${s.b};border-color:${s.c}">${s.t}</span>`
    ).join('');

    // bubble texts
    const bubbles = ['Привет!', 'Пятёрка!', '♪ кюй ♪', 'Батыр!', 'Олимп!', 'Диплом!', 'Мечта!'];

    d.innerHTML = `
      <div class="char-wrap">
        ${CHARS[w.key]}
        <div class="bubble">${bubbles[i]}</div>
      </div>
      <div class="age-badge">${w.age}</div>
      <h2>${w.title}</h2>
      <div class="loc-tag">📍 ${w.loc}</div>
      <p>${w.desc}</p>
      <div class="skills">${tags}</div>
    `;
    sw.appendChild(d);
});

// ══════════════════════════════════════════════════
//  DOTS
// ══════════════════════════════════════════════════
const dotsEl = document.getElementById('dots');
WP.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot'+(i===0?' active':'');
    d.onclick = () => goTo(i);
    dotsEl.appendChild(d);
});

// ══════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════
let cur = 0;
const slides = () => document.querySelectorAll('.slide');
const dots = () => document.querySelectorAll('.dot');
const bp = document.getElementById('bp');
const bn = document.getElementById('bn');

function goTo(idx) {
    if (idx === cur) return;
    const dir = idx > cur ? 1 : -1;
    const ss = slides();
    const dd = dots();

    ss[cur].classList.remove('active');
    if (dir > 0) {
        ss[cur].classList.add('go-left');
        setTimeout(() => ss[cur]?.classList.remove('go-left'), 400);
    }

    dd[cur].classList.remove('active');
    dd[cur].classList.add('done');

    if (dir < 0) {
        for (let k = idx; k <= cur; k++) {
            dd[k].classList.remove('done','active');
        }
    }
    dd[idx].classList.add('active');

    markers[cur].setIcon(mkIcon(WP[cur].emoji, false));
    markers[idx].setIcon(mkIcon(WP[idx].emoji, true));

    cur = idx;
    ss[cur].classList.add('active');

    map.flyTo(WP[cur].latlng, WP[cur].zoom, { duration: 1.3, easeLinearity: 0.4 });

    document.getElementById('cn').textContent = cur + 1;
    bp.disabled = cur === 0;
    bn.disabled = cur === WP.length - 1;
}

bp.addEventListener('click', () => { if (cur>0) goTo(cur-1); });
bn.addEventListener('click', () => { if (cur<WP.length-1) goTo(cur+1); });
document.addEventListener('keydown', e => {
    if (e.key==='ArrowRight' && cur<WP.length-1) goTo(cur+1);
    if (e.key==='ArrowLeft' && cur>0) goTo(cur-1);
});

document.getElementById('tn').textContent = WP.length;
bp.disabled = true;

// Fade hint
const hint = document.getElementById('hint');
setTimeout(() => { hint.style.opacity='0'; }, 4500);
document.addEventListener('click', () => { hint.style.opacity='0'; }, {once:true});
</script>
</body>
</html>
